<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmere RPG Party Tracker & Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --shard-blue: #2c3e50;
            --stormlight-gold: #f1c40f;
            --parsh-red: #c0392b;
            --bg-color: #ecf0f1;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }

        /* Left Panel: Party Tracker */
        #party-panel { width: 350px; background: var(--shard-blue); color: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 1000; }
        
        .character-card { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--stormlight-gold); }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.9em; }
        input[type="number"] { width: 50px; background: transparent; border: 1px solid #555; color: white; border-radius: 4px; padding: 2px; }
        
        /* Right Panel: Map */
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #0b1621; }

        h2 { border-bottom: 2px solid var(--stormlight-gold); padding-bottom: 5px; }
        .btn-add { background: var(--stormlight-gold); border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="party-panel">
    <h2>Party Tracker</h2>
    <div id="party-list">
        </div>
    <button class="btn-add" onclick="addCharacter()">+ Add Radiant</button>
    <p style="font-size: 0.7em; margin-top: 20px; opacity: 0.7;">
        "Life before death. Strength before weakness. Journey before destination."
    </p>
</div>

<div id="map-container">
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. MAP INITIALIZATION
    // Using an Azimuthal Equidistant projection-style setup for Roshar
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -2
    });

    // High-res Roshar Map (Community Resource)
    const bounds = [[0, 0], [1000, 1000]];
    const image = L.imageOverlay('https://roshar.17thshard.com/images/roshar_map.jpg', bounds).addTo(map);
    map.fitBounds(bounds);

    // Sample Locations (Markers)
    const locations = [
        { name: "Kholinar", coords: [620, 780], desc: "Capital of Alethkar" },
        { name: "Urithiru", coords: [550, 500], desc: "The Tower City" },
        { name: "Kharbranth", coords: [200, 750], desc: "The City of Bells" },
        { name: "Shinovar", coords: [450, 150], desc: "Land of the Stone Shamans" }
    ];

    locations.forEach(loc => {
        L.marker(loc.coords).addTo(map).bindPopup(`<b>${loc.name}</b><br>${loc.desc}`);
    });

    // 2. PARTY TRACKER LOGIC
    let party = [
        { id: 1, name: "Kaladin", path: "Windrunner", health: 20, maxHealth: 20, stormlight: 5 },
    ];

    function renderParty() {
        const list = document.getElementById('party-list');
        list.innerHTML = party.map(char => `
            <div class="character-card">
                <strong>${char.name}</strong> (${char.path})
                <div class="stat-row">
                    <span>Health:</span>
                    <span>
                        <input type="number" value="${char.health}" onchange="updateStat(${char.id}, 'health', this.value)"> / ${char.maxHealth}
                    </span>
                </div>
                <div class="stat-row">
                    <span>Stormlight:</span>
                    <span>
                        <input type="number" value="${char.stormlight}" onchange="updateStat(${char.id}, 'stormlight', this.value)">
                    </span>
                </div>
            </div>
        `).join('');
    }

    function addCharacter() {
        const name = prompt("Character Name:");
        if (!name) return;
        const newChar = {
            id: Date.now(),
            name: name,
            path: "Radiant",
            health: 20,
            maxHealth: 20,
            stormlight: 0
        };
        party.push(newChar);
        renderParty();
    }

    function updateStat(id, stat, val) {
        const char = party.find(c => c.id === id);
        if (char) char[stat] = parseInt(val);
    }

    // Initial render
    renderParty();

    // Click map to get coordinates (for GMing)
    map.on('click', function(e) {
        console.log("Clicked at: ", e.latlng);
    });
</script>

</body>
</html>
