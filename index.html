<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cosmere RPG - High-Res Companion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --shard: #1a252f; --gold: #f1c40f; --danger: #e74c3c; --bg: #2c3e50; --focus: #9b59b6; --invest: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #000; color: #ecf0f1; overflow: hidden; }
        
        #sidebar { width: 440px; background: var(--bg); display: flex; flex-direction: column; box-shadow: 4px 0 15px #000; z-index: 1001; }
        .header { padding: 15px; background: var(--shard); border-bottom: 2px solid var(--gold); }
        #party-list { flex-grow: 1; padding: 10px; overflow-y: auto; }
        
        .card { background: rgba(0,0,0,0.4); border-left: 5px solid var(--gold); padding: 12px; margin-bottom: 15px; border-radius: 4px; position: relative; font-size: 0.85em; }
        .del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; padding: 3px; border-radius: 3px; box-sizing: border-box; }
        .char-name { font-weight: bold; font-size: 1.1em; border: none !important; width: 85%; }
        .char-path { font-size: 0.8em; opacity: 0.7; border: none !important; width: 85%; margin-bottom: 5px; }

        .section-label { font-size: 0.6em; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; margin: 10px 0 4px 0; border-bottom: 1px solid #444; padding-bottom: 2px; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
        .stat-box { text-align: center; }
        .stat-box label { font-size: 0.55em; display: block; margin-bottom: 2px; color: #bdc3c7; white-space: nowrap; }

        .resource-hp { border-bottom: 2px solid var(--danger); }
        .resource-focus { border-bottom: 2px solid var(--focus); }
        .resource-invest { border-bottom: 2px solid var(--invest); }

        .add-btn { margin: 10px; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: #111; }
        
        #map { flex-grow: 1; background: #0b1621; }
        .coord-display { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 0.8em; z-index: 1000; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2 style="margin:0">Bridge Four Tracker</h2>
    </div>
    <div id="party-list"></div>
    <button class="add-btn" onclick="addChar()">+ Add Character</button>
</div>

<div id="map"></div>
<div class="coord-display" id="coords">Click map to move Party</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let party = JSON.parse(localStorage.getItem('cosmereParty')) || [];
    let partyMarker = null;

    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, attributionControl: false });
    const img = new Image();
    img.src = 'roshar.webp'; 
    
    img.onload = function() {
        const bounds = [[0, 0], [this.height, this.width]]; 
        L.imageOverlay('roshar.webp', bounds).addTo(map);
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);
    };

    map.on('click', e => {
        if (partyMarker) partyMarker.setLatLng(e.latlng); 
        else partyMarker = L.marker(e.latlng).addTo(map).bindPopup("Current Location").openPopup();
        document.getElementById('coords').innerText = `Lat: ${Math.round(e.latlng.lat)}, Lng: ${Math.round(e.latlng.lng)}`;
    });

    function render() {
        const list = document.getElementById('party-list');
        list.innerHTML = party.map(c => `
            <div class="card">
                <button class="del" onclick="removeChar(${c.id})">✕</button>
                <input type="text" class="char-name" value="${c.name}" onchange="update(${c.id}, 'name', this.value)" placeholder="Name">
                <input type="text" class="char-path" value="${c.path}" onchange="update(${c.id}, 'path', this.value)" placeholder="Path / Order">
                
                <div class="section-label">Attributes & Defenses</div>
                <div class="grid-4">
                    <div class="stat-box"><label>STR</label><input type="number" value="${c.str}" onchange="update(${c.id}, 'str', this.value)"></div>
                    <div class="stat-box"><label>SPD</label><input type="number" value="${c.spd}" onchange="update(${c.id}, 'spd', this.value)"></div>
                    <div class="stat-box"><label>INT</label><input type="number" value="${c.int}" onchange="update(${c.id}, 'int', this.value)"></div>
                    <div class="stat-box"><label>WIL</label><input type="number" value="${c.wil}" onchange="update(${c.id}, 'wil', this.value)"></div>
                </div>
                <div class="grid-4" style="margin-top:5px;">
                    <div class="stat-box"><label>PHYS DEF</label><input type="number" value="${c.defP}" onchange="update(${c.id}, 'defP', this.value)"></div>
                    <div class="stat-box"><label>COGN DEF</label><input type="number" value="${c.defC}" onchange="update(${c.id}, 'defC', this.value)"></div>
                    <div class="stat-box"><label>SPIR DEF</label><input type="number" value="${c.defS}" onchange="update(${c.id}, 'defS', this.value)"></div>
                    <div class="stat-box"><label>DEFLECT</label><input type="number" value="${c.deflect}" onchange="update(${c.id}, 'deflect', this.value)" style="color:var(--gold)"></div>
                </div>

                <div class="section-label">Vitals & Resources</div>
                <div class="grid-3">
                    <div class="stat-box"><label>HEALTH</label><input type="number" class="resource-hp" value="${c.hp}" onchange="update(${c.id}, 'hp', this.value)"></div>
                    <div class="stat-box"><label>FOCUS</label><input type="number" class="resource-focus" value="${c.focus}" onchange="update(${c.id}, 'focus', this.value)"></div>
                    <div class="stat-box"><label>INVEST.</label><input type="number" class="resource-invest" value="${c.invest}" onchange="update(${c.id}, 'invest', this.value)"></div>
                </div>

                <div class="section-label">Combat Output</div>
                <div class="grid-3">
                    <div class="stat-box"><label>ATK DAMAGE</label><input type="text" value="${c.atkDmg}" onchange="update(${c.id}, 'atkDmg', this.value)" placeholder="e.g. 2d6+3"></div>
                    <div class="stat-box"><label>ARMOR</label><input type="number" value="${c.armor}" onchange="update(${c.id}, 'armor', this.value)"></div>
                    <div class="stat-box"><label>WOUNDS</label><input type="number" value="${c.dmgTaken}" onchange="update(${c.id}, 'dmgTaken', this.value)" style="color:var(--danger)"></div>
                </div>
            </div>
        `).join('');
        localStorage.setItem('cosmereParty', JSON.stringify(party));
    }

    function addChar() {
        party.push({ 
            id: Date.now(), name: "New Hero", path: "1st Ideal",
            str: 0, spd: 0, int: 0, wil: 0,
            defP: 10, defC: 10, defS: 10, deflect: 0,
            hp: 20, focus: 5, invest: 3,
            atkDmg: "1d6", armor: 0, dmgTaken: 0
        });
        render();
    }

    function removeChar(id) {
        if(confirm("Delete hero?")) { party = party.filter(p => p.id !== id); render(); }
    }

    function update(id, key, val) {
        const c = party.find(p => p.id === id);
        if(c) {
            // Allow string for damage (like 2d6), others are numbers
            c[key] = (isNaN(val) || val === '' || key === 'atkDmg' || key === 'name' || key === 'path') ? val : parseInt(val);
            localStorage.setItem('cosmereParty', JSON.stringify(party));
        }
    }

    render();
    window.addEventListener('resize', () => map.invalidateSize());
</script>
</body>
</html>
