<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cosmere RPG - Roshar Companion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --shard: #1a252f; --gold: #f1c40f; --danger: #e74c3c; --bg: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #000; color: #ecf0f1; }
        
        /* Sidebar Styles */
        #sidebar { width: 350px; background: var(--bg); display: flex; flex-direction: column; box-shadow: 4px 0 15px #000; z-index: 1001; }
        .header { padding: 20px; background: var(--shard); border-bottom: 2px solid var(--gold); }
        #party-list { flex-grow: 1; padding: 15px; overflow-y: auto; }
        
        /* Character Card Styles */
        .card { background: rgba(0,0,0,0.3); border-left: 5px solid var(--gold); padding: 15px; margin-bottom: 12px; border-radius: 4px; position: relative; }
        .del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stats label { font-size: 0.65em; text-transform: uppercase; color: var(--gold); display: block; }
        input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px; border-radius: 3px; }
        
        .add-btn { margin: 15px; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        /* Map Area */
        #map { flex-grow: 1; background: #0b1621; }
        .coord-display { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 0.8em; z-index: 1000; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2 style="margin:0">Party Tracker</h2>
        <small>Cosmere RPG Session</small>
    </div>
    <div id="party-list"></div>
    <button class="add-btn" onclick="addChar()">+ Add Party Member</button>
</div>

<div id="map"></div>
<div class="coord-display" id="coords">Click map for coordinates</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- MAP LOGIC ---
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
    
    // THIS USES YOUR LOCAL FILE
    const mapFile = 'roshar.webp'; 
    const bounds = [[0, 0], [1000, 1000]];
    const image = L.imageOverlay(mapFile, bounds).addTo(map);
    map.fitBounds(bounds);

    // Coordinate Helper
    map.on('click', e => {
        const {lat, lng} = e.latlng;
        document.getElementById('coords').innerText = `Lat: ${Math.round(lat)}, Lng: ${Math.round(lng)}`;
    });

    // --- PARTY TRACKER LOGIC ---
    let party = JSON.parse(localStorage.getItem('cosmereParty')) || [];

    function render() {
        const list = document.getElementById('party-list');
        list.innerHTML = party.map(c => `
            <div class="card">
                <button class="del" onclick="removeChar(${c.id})">✕</button>
                <input type="text" value="${c.name}" onchange="update(${c.id}, 'name', this.value)" style="font-weight:bold; border:none; background:none; font-size:1.1em;">
                <div class="stats">
                    <div><label>Health</label><input type="number" value="${c.hp}" onchange="update(${c.id}, 'hp', this.value)"></div>
                    <div><label>Stormlight</label><input type="number" value="${c.sl}" onchange="update(${c.id}, 'sl', this.value)"></div>
                </div>
            </div>
        `).join('');
        localStorage.setItem('cosmereParty', JSON.stringify(party));
    }

    function addChar() {
        party.push({ id: Date.now(), name: "New Radiant", hp: 20, sl: 3 });
        render();
    }

    function removeChar(id) {
        if(confirm("Delete character?")) {
            party = party.filter(c => c.id !== id);
            render();
        }
    }

    function update(id, key, val) {
        const c = party.find(p => p.id === id);
        if(c) {
            c[key] = isNaN(val) ? val : parseInt(val);
            localStorage.setItem('cosmereParty', JSON.stringify(party));
        }
    }

    render();
    // Fix for initial load rendering
    setTimeout(() => { map.invalidateSize(); }, 200);
</script>
</body>
</html>
